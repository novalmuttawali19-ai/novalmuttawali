<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Belanja Barbie Digital</title>
    <!-- Menggunakan Font Nunito untuk tampilan yang cute dan modern -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette Warna Barbie Digital Modern */
            --primary-pink: #FF69B4; /* Hot Pink */
            --soft-pink: #FFC0CB;   /* Light Pink */
            --pale-pink: #FFE6EB;   /* Background Sangat Muda */
            --dark-pink: #D81B60;   /* Aksen Gelap */
            --white: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFF0F5 0%, #FFB6C1 100%);
            min-height: 100vh;
            color: #4A4A4A;
            overflow-x: hidden;
            position: relative;
        }

        /* Container Salju Bunga */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Agar klik tembus ke bawah */
            z-index: 1;
            overflow: hidden;
        }

        .flake {
            position: absolute;
            top: -10px;
            color: var(--soft-pink);
            font-size: 1.5rem;
            user-select: none;
            animation: fall linear infinite;
            filter: drop-shadow(0 0 5px rgba(255, 182, 193, 0.8));
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }

        /* Layout Utama */
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 30px;
            box-shadow: var(--shadow);
        }

        h1 {
            color: var(--dark-pink);
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--primary-pink);
            font-weight: 600;
        }

        /* Tombol Tambah Data */
        .action-bar {
            text-align: right;
            margin-bottom: 30px;
        }

        .btn-add {
            background: linear-gradient(45deg, var(--primary-pink), var(--dark-pink));
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.6);
        }

        /* Grid Kategori */
        .category-section {
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-title {
            background: white;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            color: var(--dark-pink);
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--pale-pink);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Kartu Item */
        .item-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid white;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--primary-pink);
        }

        .item-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
        }

        .item-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .item-unit {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
            background: var(--pale-pink);
            padding: 4px 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .item-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dark-pink);
            text-align: right;
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #ffcad4;
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        
        .delete-btn:hover {
            color: red;
        }

        /* Modal Form */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 192, 203, 0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 3px solid var(--soft-pink);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--dark-pink);
            font-weight: 800;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--pale-pink);
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            background: #FFFAFB;
        }

        .form-control:focus {
            border-color: var(--primary-pink);
            background: white;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-submit {
            flex: 2;
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel {
            flex: 1;
            background: #f0f0f0;
            color: #888;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--dark-pink);
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 200;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.3);
            font-weight: 600;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
        
        /* Footer Total */
        .footer-total {
            margin-top: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark-pink);
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid white;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .items-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Efek Salju Bunga -->
    <div id="snow-container"></div>

    <div class="app-container">
        <header>
            <h1>Daftar Belanja</h1>
            <p class="subtitle">Edisi Spesial Pink & Cantik</p>
        </header>

        <div class="action-bar">
            <button class="btn-add" onclick="openModal()">
                <span>+</span> Tambah Item Baru
            </button>
        </div>

        <main id="content-area">
            <!-- Data akan di-render di sini oleh JavaScript -->
        </main>

        <div class="footer-total">
            Total Estimasi: <span id="grand-total">Rp 0</span>
        </div>
    </div>

    <!-- Modal Form Tambah Data -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <div class="modal-header">Tambah Item Baru</div>
            <form id="addItemForm">
                <div class="form-group">
                    <label>Kategori</label>
                    <select class="form-control" id="inputCategory" required>
                        <option value="Buah-buahan">Buah-buahan</option>
                        <option value="Sayur-sayuran">Sayur-sayuran</option>
                        <option value="Minuman">Minuman</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nama Item</label>
                    <input type="text" class="form-control" id="inputName" placeholder="Contoh: Jeruk" required>
                </div>
                <div class="form-group">
                    <label>Satuan / Ukuran</label>
                    <input type="text" class="form-control" id="inputUnit" placeholder="Contoh: 1kg atau 1 paket" required>
                </div>
                <div class="form-group">
                    <label>Harga (Rupiah)</label>
                    <input type="number" class="form-control" id="inputPrice" placeholder="Contoh: 25000" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-submit">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Item berhasil ditambahkan!</div>

    <script>
        // --- DATA AWAL ---
        // Harga adalah estimasi pasar yang reasonable
        let inventory = [
            // Buah-buahan
            { id: 1, category: 'Buah-buahan', name: 'Alpukat', unit: '1kg', price: 35000, icon: '🥑' },
            { id: 2, category: 'Buah-buahan', name: 'Apel', unit: '1kg', price: 30000, icon: '🍎' },
            { id: 3, category: 'Buah-buahan', name: 'Pir', unit: '1kg', price: 45000, icon: '🍐' },
            { id: 4, category: 'Buah-buahan', name: 'Anggur', unit: '1kg', price: 65000, icon: '🍇' },
            
            // Sayur-sayuran
            { id: 5, category: 'Sayur-sayuran', name: 'Cabe Merah', unit: '1kg', price: 60000, icon: '🌶️' },
            { id: 6, category: 'Sayur-sayuran', name: 'Bawang Merah', unit: '1kg', price: 32000, icon: '🧅' },
            { id: 7, category: 'Sayur-sayuran', name: 'Bawang Putih', unit: '1kg', price: 45000, icon: '🧄' },
            { id: 8, category: 'Sayur-sayuran', name: 'Tomat', unit: '1kg', price: 12000, icon: '🍅' },

            // Minuman
            { id: 9, category: 'Minuman', name: 'Vsoy Kacang Hijau', unit: '5 botol', price: 45000, icon: '🥤' }
        ];

        // --- FORMAT RUPIAH ---
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(number);
        };

        // --- RENDER DATA ---
        const contentArea = document.getElementById('content-area');
        const grandTotalEl = document.getElementById('grand-total');

        function renderData() {
            contentArea.innerHTML = '';
            let totalHargaSemua = 0;

            // Mengelompokkan data berdasarkan kategori
            const categories = [...new Set(inventory.map(item => item.category))];

            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';
                
                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'items-grid';

                const itemsInCategory = inventory.filter(item => item.category === cat);

                itemsInCategory.forEach(item => {
                    totalHargaSemua += item.price;
                    
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <button class="delete-btn" onclick="deleteItem(${item.id})">&times;</button>
                        <span class="item-icon">${item.icon}</span>
                        <div class="item-name">${item.name}</div>
                        <div class="item-unit">${item.unit}</div>
                        <div class="item-price">${formatRupiah(item.price)}</div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                contentArea.appendChild(section);
            });

            grandTotalEl.innerText = formatRupiah(totalHargaSemua);
        }

        // --- MANAJEMEN MODAL (TAMBAH DATA) ---
        const modal = document.getElementById('addModal');
        const form = document.getElementById('addItemForm');

        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            form.reset();
        }

        // Menutup modal jika klik di luar area konten
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // --- TAMBAH ITEM BARU ---
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const category = document.getElementById('inputCategory').value;
            const name = document.getElementById('inputName').value;
            const unit = document.getElementById('inputUnit').value;
            const price = parseFloat(document.getElementById('inputPrice').value);

            // Menentukan emoji sederhana berdasarkan kategori
            let icon = '📦';
            if (category === 'Buah-buahan') icon = '🍓';
            if (category === 'Sayur-sayuran') icon = '🥬';
            if (category === 'Minuman') icon = '🥛';

            const newItem = {
                id: Date.now(), // Unique ID sederhana
                category: category,
                name: name,
                unit: unit,
                price: price,
                icon: icon
            };

            inventory.push(newItem);
            inventory.sort((a, b) => a.category.localeCompare(b.category)); // Sort agar kategori terkelompok rapi
            
            renderData();
            closeModal();
            showToast();
        });

        // --- HAPUS ITEM ---
        window.deleteItem = function(id) {
            if(confirm('Apakah Anda yakin ingin menghapus item ini?')) {
                inventory = inventory.filter(item => item.id !== id);
                renderData();
            }
        };

        // --- TOAST NOTIFICATION ---
        function showToast() {
            const x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }

        // --- EFEK SALJU BUNGA (Snow Flower) ---
        function createSnowFlake() {
            const snowContainer = document.getElementById('snow-container');
            const flake = document.createElement('div');
            flake.className = 'flake';
            flake.innerHTML = '🌸'; // Emoji bunga sakura
            
            // Posisi random
            flake.style.left = Math.random() * 100 + 'vw';
            // Ukuran random
            const size = Math.random() * 1.5 + 0.5; // 0.5rem sampai 2rem
            flake.style.fontSize = size + 'rem';
            // Durasi animasi random
            const duration = Math.random() * 5 + 5; // 5s sampai 10s
            flake.style.animationDuration = duration + 's';
            
            // Opacity random
            flake.style.opacity = Math.random();

            snowContainer.appendChild(flake);

            // Hapus elemen setelah animasi selesai agar memory tidak penuh
            setTimeout(() => {
                flake.remove();
            }, duration * 1000);
        }

        // Jalankan efek salju setiap 300ms
        setInterval(createSnowFlake, 300);

        // --- INISIALISASI ---
        renderData();

    </script>
</body>
</html>
